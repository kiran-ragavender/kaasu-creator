<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Calculator - Kaasu Creator</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .calculator-wrapper {
            display: flex;
            justify-content: center;
            margin-top: 8px;
            margin-bottom: 40px;
        }

        .calculator {
            background: var(--bg-card);
            border: 1px solid #1e1e1e;
            padding: 24px;
            border-radius: 20px;
            width: 320px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .display {
            height: 80px;
            background: #0a0a0a;
            border: 1px solid #252525;
            color: var(--text-primary);
            font-size: 2rem;
            font-weight: 700;
            text-align: right;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 16px;
            overflow-x: auto;
            letter-spacing: -0.5px;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .btn {
            height: 60px;
            font-size: 1.15rem;
            font-weight: 600;
            border: 1px solid #1e1e1e;
            border-radius: 12px;
            background: #181818;
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.15s;
        }

        .btn:hover {
            background: #242424;
            border-color: #2e2e2e;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .operator {
            background: var(--red-dim);
            color: var(--red);
            border-color: var(--red-border);
            font-weight: 700;
        }

        .operator:hover {
            background: rgba(232, 121, 160, 0.2);
        }

        .equals {
            background: var(--red);
            color: white;
            border-color: var(--red);
            grid-row: span 2;
            box-shadow: 0 4px 16px var(--red-glow);
            font-weight: 700;
        }

        .equals:hover {
            background: var(--accent-purple);
            box-shadow: 0 6px 22px var(--red-glow);
        }

        .action {
            background: #1e1e1e;
            color: var(--muted);
            border-color: #252525;
        }

        .action:hover {
            color: var(--red);
            border-color: var(--red-border);
        }

        .zero {
            grid-column: span 2;
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <a href="/dashboard" class="navbar-brand">💸 Kaasu Creator</a>
        <div class="navbar-links">
            <a href="/dashboard">Dashboard</a>
            <a href="/income">Income</a>
            <a href="/budget">Expenses</a>
            <a href="/calculator">Calculator</a>
            <a href="/ai-roadmap">AI Roadmap</a>
            <a href="/profile">Profile</a>
            <a href="/logout" style="color:var(--accent-pink);">Logout</a>
        </div>
    </nav>

    <div class="container">
        <button onclick="history.back()" class="back-btn">← Back</button>

        <div class="page-header">
            <span class="ph-icon">🧮</span>
            <h1 class="ph-title">Calculator</h1>
            <p class="ph-sub">Quick math with full keyboard support.</p>
        </div>

        <div class="calculator-wrapper" style="margin-top:8px;">
            <div class="calculator">

                <!-- Display -->
                <div id="display" class="display">0</div>

                <!-- Buttons -->
                <div class="buttons">
                    <button class="btn action" onclick="clearDisplay()">C</button>
                    <button class="btn operator" onclick="append('/')">÷</button>
                    <button class="btn operator" onclick="append('*')">×</button>
                    <button class="btn operator" onclick="append('-')">−</button>

                    <button class="btn" onclick="append('7')">7</button>
                    <button class="btn" onclick="append('8')">8</button>
                    <button class="btn" onclick="append('9')">9</button>
                    <button class="btn operator" onclick="append('+')">+</button>

                    <button class="btn" onclick="append('4')">4</button>
                    <button class="btn" onclick="append('5')">5</button>
                    <button class="btn" onclick="append('6')">6</button>
                    <button class="btn equals" onclick="calculate()">=</button>

                    <button class="btn" onclick="append('1')">1</button>
                    <button class="btn" onclick="append('2')">2</button>
                    <button class="btn" onclick="append('3')">3</button>

                    <button class="btn zero" onclick="append('0')">0</button>
                    <button class="btn" onclick="append('.')">.</button>
                </div>

            </div>
        </div>
    </div>

    <!-- Kaasu-chan mascot -->
    <div class="kaasu-mascot">
        💁‍♀️
        <div class="kaasu-speech">
            <strong>Kaasu-chan:</strong><br>
            "Tap tap tap! Let's do some math~"
        </div>
    </div>

    <script>
        let display = document.getElementById('display');
        let errorMessage = document.getElementById('error-message');
        let currentInput = '0';
        let operator = '';
        let previousValue = '';

        function updateDisplay() {
            display.textContent = currentInput;
        }

        function showError(message) {
            // Error message display removed in new design
            console.log('Calculator error:', message);
        }

        function clearDisplay() {
            currentInput = '0';
            operator = '';
            previousValue = '';
            updateDisplay();
        }

        function append(value) {
            // Map the new symbols to the old ones
            let mappedValue = value;
            if (value === '/') {
                mappedValue = '÷';
            } else if (value === '*') {
                mappedValue = '×';
            }
            appendToDisplay(mappedValue);
        }

        function appendToDisplay(value) {
            if (currentInput === '0' && value !== '.') {
                currentInput = value;
            } else {
                // Prevent multiple decimal points
                if (value === '.' && currentInput.includes('.')) {
                    return;
                }
                // Prevent multiple operators in a row
                if (['+', '-', '×', '÷'].includes(value) && ['+', '-', '×', '÷'].includes(currentInput.slice(-1))) {
                    currentInput = currentInput.slice(0, -1) + value;
                } else {
                    currentInput += value;
                }
            }
            updateDisplay();
        }

        function calculate() {
            try {
                // Replace symbols with JavaScript operators
                let expression = currentInput
                    .replace(/×/g, '*')
                    .replace(/÷/g, '/');

                // Check for division by zero
                if (expression.includes('/0')) {
                    showError("Oops! Can't divide by zero 💔");
                    return;
                }

                // Evaluate the expression safely
                let result = eval(expression);

                // Handle invalid results
                if (!isFinite(result)) {
                    showError("Invalid calculation! Please check your input.");
                    return;
                }

                // Format the result
                if (Number.isInteger(result)) {
                    currentInput = result.toString();
                } else {
                    currentInput = result.toFixed(2);
                }

                updateDisplay();
            } catch (error) {
                showError("Invalid expression! Please try again.");
            }
        }

        // Keyboard support
        document.addEventListener('keydown', function(event) {
            const key = event.key;

            if (key >= '0' && key <= '9') {
                appendToDisplay(key);
            } else if (key === '.') {
                appendToDisplay('.');
            } else if (key === '+') {
                appendToDisplay('+');
            } else if (key === '-') {
                appendToDisplay('-');
            } else if (key === '*') {
                appendToDisplay('×');
            } else if (key === '/') {
                appendToDisplay('÷');
            } else if (key === 'Enter' || key === '=') {
                calculate();
            } else if (key === 'Escape' || key === 'c' || key === 'C') {
                clearDisplay();
            }
        });

        // Initialize display
        updateDisplay();
    </script>

    <script src="/js/app.js"></script>
</body>
</html>
